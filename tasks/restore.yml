---
###############################################################################
# Restore
###############################################################################
# Find the latest set of backups and copy to remote. Restart services and
# validate they are running from role.
#
# Use synchronize instead of unarchive as metadata may be multi-GB.

- name: 'Restore | filesystem | enumerate all backups'
  delegate_to: 'localhost'
  ansible.builtin.find:
    paths: '{{ seerr__cfg._backup_dir }}'
    patterns: '*.tar.xz'
    file_type: 'file'
    recurse: false
  register: seerr__archive

# Grab datestamp from expected 'YYYY-MM-DDTHHMMSS_{FILE}' format.
- name: 'Restore | fact | parse latest backup'
  when: seerr__archive.files | length > 0
  ansible.builtin.set_fact:
    seerr__restore_archive: '{{

        (
          seerr__archive.files |
          sort(attribute="mtime", reverse=true) |
          first
        ).path
      }}'

- name: '{{ "Restore | copy | " ~ seerr__restore_archive }}'
  ansible.posix.synchronize:
    src: '{{ seerr__restore_archive }}'
    dest: '{{ "/tmp/" ~ seerr__restore_archive | basename }}'

- name:
    '{{ "Restore | filesystem | /tmp/" ~ seerr__restore_archive | basename }}'
  ansible.builtin.command: '{{
      "/usr/bin/tar -xJpf " ~
      "/tmp/" ~ seerr__restore_archive | basename ~
      " -C " ~ seerr__cfg._env | dirname ~ " --overwrite"
    }}'
  changed_when: true

- name: 'Restore | filesystem | cleanup'
  ansible.builtin.file:
    path: '{{ "/tmp/" ~ seerr__restore_archive | basename }}'
    state: 'absent'

- name: 'Restore | start'
  ansible.builtin.import_tasks: 'start.yml'

- name: 'Restore | success ✔'
  ansible.builtin.meta: 'end_host'
