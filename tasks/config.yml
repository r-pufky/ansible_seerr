---
###############################################################################
# Seerr Config
###############################################################################
#
# Configuration:
# * service: seerr.conf
# * application: config/settings.json
# * db: config/db/db.sqlite3
# * update check: committag.json
#
# Users are managed via the REST API after the service is running. Database is
# automatically migrated to a updated installation if enabled.
#
# Reference:
# * https://docs.seerr.dev/getting-started/buildfromsource
# * https://api-docs.seerr.dev/

- name: 'Install | {{ seerr_role_etc_dir }}'
  ansible.builtin.file:
    path: '{{ seerr_role_etc_dir }}'
    owner: 'root'
    group: 'root'
    mode: '0755'
    state: 'directory'

- name: 'Config | set service options'
  ansible.builtin.template:
    src: 'seerr.conf.j2'
    dest: '{{ seerr_role_service_cfg }}'
    owner: '{{ _seerr_srv_user._uid }}'
    group: '{{ _seerr_srv_group._gid }}'
    mode: '0640'

- name: 'Config | set Seerr config'
  ansible.builtin.template:
    src: 'settings.json.j2'
    dest: '{{ seerr_role_settings_cfg }}'
    owner: '{{ _seerr_srv_user._uid }}'
    group: '{{ _seerr_srv_group._gid }}'
    mode: '0640'

- name: 'Config | secure config directories'
  ansible.builtin.file:
    path: '{{ seerr_role_config_dir }}'
    owner: '{{ _seerr_srv_user._uid }}'
    group: '{{ _seerr_srv_group._gid }}'
    mode: 'o-rwx'
    recurse: true
    state: 'directory'

- name: 'Config | set CA file'
  when: _seerr_cfg_db_ssl_ca_file.raw | length > 0
  ansible.builtin.copy:
    src: '{{ _seerr_cfg_db_ssl_ca_file.raw }}'
    dest: '{{ _seerr_cfg_db_ssl_ca_file._dest }}'
    owner: '{{ _seerr_srv_user._uid }}'
    group: '{{ _seerr_srv_group._gid }}'
    mode: '{{ _seerr_cfg_db_ssl_ca_file._perms }}'
    force: true

- name: 'Config | reset CA file'
  when: _seerr_cfg_db_ssl_ca_file.raw | length == 0
  ansible.builtin.file:
    path: '{{ _seerr_cfg_db_ssl_ca_file._dest }}'
    state: 'absent'

- name: 'Config | set private key file'
  when: _seerr_cfg_db_ssl_key_file.raw | length > 0
  ansible.builtin.copy:
    src: '{{ _seerr_cfg_db_ssl_key_file.raw }}'
    dest: '{{ _seerr_cfg_db_ssl_key_file._dest }}'
    owner: '{{ _seerr_srv_user._uid }}'
    group: '{{ _seerr_srv_group._gid }}'
    mode: '{{ _seerr_cfg_db_ssl_key_file._perms }}'
    force: true

- name: 'Config | reset private key file'
  when: _seerr_cfg_db_ssl_key_file.raw | length == 0
  ansible.builtin.file:
    path: '{{ _seerr_cfg_db_ssl_key_file._dest }}'
    state: 'absent'

- name: 'Config | set certificate chain file'
  when: _seerr_cfg_db_ssl_cert_file.raw | length > 0
  ansible.builtin.copy:
    src: '{{ _seerr_cfg_db_ssl_cert_file.raw }}'
    dest: '{{ _seerr_cfg_db_ssl_cert_file._dest }}'
    owner: '{{ _seerr_srv_user._uid }}'
    group: '{{ _seerr_srv_group._gid }}'
    mode: '{{ _seerr_cfg_db_ssl_cert_file._perms }}'
    force: true

- name: 'Config | reset certificate chain file'
  when: _seerr_cfg_db_ssl_cert_file.raw | length == 0
  ansible.builtin.file:
    path: '{{ _seerr_cfg_db_ssl_cert_file._dest }}'
    state: 'absent'

- name: 'Config | resolve node location'
  ansible.builtin.shell:
    source {{ _seerr.nvm_env }} &&
    which node
  args:
    executable: '/bin/bash'
  changed_when: false
  become: true
  become_user: '{{ _seerr_srv_user.raw }}'
  register: _seerr_node_path

- name: 'Config | Seerr service'
  ansible.builtin.include_role:
    name: 'r_pufky.deb.systemd'
  vars:
    systemd_daemon_reload_enable: true
    systemd_services:
      - name: 'seerr'
        state: 'present'
        drop_in: false
        unit:
          description: 'Seerr Daemon'
          wants:
            - 'network.target'
          after:
            - 'network.target'
        service:
          type: 'exec'
          exec_start:
            - '{{ _seerr_node_path.stdout }} dist/index.js'
          timeout_stop_sec: 20
          restart: 'always'  # Always restart for periodic service restarts.
          runtime_max_sec: '{{
              "1d"
              if _seerr_srv_restart_daily_enable.raw else
              "infinity"
            }}'
        exec:
          environment:
            - var: 'NODE_ENV'
              value: 'production'
          environment_file:
            - '{{ seerr_role_service_cfg }}'
          working_directory: '{{ seerr_role_opt_dir }}'
          user: '{{ _seerr_srv_user.raw }}'
          group: '{{ _seerr_srv_group.raw }}'
          u_mask: '{{ _seerr_srv_u_mask.raw }}'
        kill:
          kill_mode: 'process'
        install:
          wanted_by:
            - 'multi-user.target'

# Local user management requires service running or running 'install' state.
- name: 'Config | start services'
  ansible.builtin.systemd:
    name: '{{ item }}'
    enabled: true
    daemon_reload: true
    state: 'started'
  failed_when: false
  loop:
    - 'seerr.service'

- name: 'Config | start services'
  ansible.builtin.meta: 'flush_handlers'
