---
###############################################################################
# Configure Services
###############################################################################
# Filetree returns a dict (instead of a list of dict) for one element. Use
# query to guarantee a list result.
#
# cache (metadata) directory is Multi-GB. Safe to delete but will cause large
# metadata downloads on new version if not migrated with databases. Exclude
# from removal during configuration sync.
#
# Environment file is used to manage service settings. Stored with config data
# in /var/opt/seerr/config. Users may be managed via the REST API after the
# service is running. Database is automatically migrated to a updated
# installation if enabled.
#
# Reference:
# * https://docs.seerr.dev/getting-started/buildfromsource
# * https://api-docs.seerr.dev/

- name: 'Config | filetree | deploy managed files'
  ansible.builtin.template:
    src: '{{ item.src }}'
    dest: '{{ seerr__cfg._env | dirname ~ "/" ~ item.path }}'
    owner: '{{ seerr__srv._user }}'
    group: '{{ seerr__srv._group }}'
    mode: '0640'
  loop: '{{ query("community.general.filetree", seerr__cfg._dir) }}'
  loop_control:
    label: '{{ item.path }}'
  when: item.state == 'file'
  register: seerr__local

- name: 'Config | filesystem | query remote files'
  ansible.builtin.find:
    paths: '{{ seerr__cfg._env | dirname }}'
    file_type: 'file'
    recurse: true
    excludes: 'MediaCover'  # Ignore MediaCover to prevent metadata deletion.
  register: seerr__remote

- name: 'Config | filesystem | remove unmanaged files'
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: 'absent'
  loop: '{{ seerr__remote.files }}'
  loop_control:
    label: '{{ item.path }}'
  when: >
    item.path not in seerr__local.results | map(attribute='dest') | list
