      │ seerr_cfg_trust_proxy: '{{ seerr_cfg_trust_proxy }}'
      │ seerr_cfg_proxy_enabled: '{{ seerr_cfg_proxy_enabled }}'

      See: https://docs.seerr.dev/using-seerr/notifications/webpush

