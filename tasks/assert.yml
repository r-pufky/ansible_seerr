---
# yamllint disable rule:line-length
###############################################################################
# Assert Settings
###############################################################################
# Sanity check options to stop preventable errors and accidental data deletion.

- name: 'Assert | email notification requirements'
  when: seerr_cfg_agents_email_enabled
  ansible.builtin.assert:
    quiet: true
    that:
      - seerr_cfg_agents_email_email_from | length > 0
      - seerr_cfg_agents_email_smtp_host | length > 0
      - seerr_cfg_agents_email_smtp_port is defined
    fail_msg: |
      ╭───────────────────────────────────────────────────────────────────╮
      │                                                                   │
      │           Email notifications require all options set.            │
      │                                                                   │
      ├───────────────────────────────────────────────────────────────────╯
      │ seerr_cfg_agents_email_enabled: '{{ seerr_cfg_agents_email_enabled }}'
      │ seerr_cfg_agents_email_email_from: '{{ seerr_cfg_agents_email_email_from }}'
      │ seerr_cfg_agents_email_smtp_host: '{{ seerr_cfg_agents_email_smtp_host }}'
      │ seerr_cfg_agents_email_smtp_port: '{{ seerr_cfg_agents_email_smtp_port }}'
      │ seerr_cfg_agents_email_secure: '{{ seerr_cfg_agents_email_secure }}'
      │ seerr_cfg_agents_email_ignore_tls: '{{ seerr_cfg_agents_email_ignore_tls }}'
      │ seerr_cfg_agents_email_require_tls: '{{ seerr_cfg_agents_email_require_tls }}'

