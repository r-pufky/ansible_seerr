- name: 'Assert | postgres server options mutually exclusive'
  when: seerr_cfg_db_type != 'sqlite'
  ansible.builtin.assert:
    quiet: true
    that: seerr_cfg_db_host != seerr_cfg_db_socket_path
    fail_msg: |
      ╭───────────────────────────────────────────────────────────────────╮
      │                                                                   │
      │          Postgres server options are mutually exclusive.          │
      │                                                                   │
      ├───────────────────────────────────────────────────────────────────╯
      │ seerr_cfg_db_host: '{{ seerr_cfg_db_host }}'
      │ seerr_cfg_db_socket_path: '{{ seerr_cfg_db_socket_path }}'
