---
# yamllint disable rule:line-length
###############################################################################
# Set Owner
###############################################################################
# Seerr must be up and running to ensure DB's are created. Manually add
# owner to DB if required. Confirm owner API access.
#
# Use builtin Seerr bcrypt library for generating password hash and inject
# user with minimum required DB columns.
#
# Decision: Only manage owner - REST API does not provide a good way to set
#     user passwords (requires old and new passwords), etc; without directly
#     editing DB. Instead create required user so user can login.
#
# User MUST have following attributes set:
# * id=1
# * email
# * permissions=2
# * avatar
# * password
# * user_type=2
#
# Jinja2 wart: Automatically generated JSON bodies in URI renders variables as
#              strings before creating the JSON object, leading to 'Value
#              should be integer' errors even when converting with '| int' in
#              task. Building JSON strings manually when more than string types
#              are required to avoid this issue. See reference.
#
# Reference:
# * http://localhost:5055/api-docs
# * https://github.com/ansible/ansible/issues/77808
# * https://stackoverflow.com/questions/50123855/ansible-uri-module-passing-integer-from-variable

- name: 'Set owner | poll service 🗘'
  when: _seerr_srv_poll_enable.raw
  ansible.builtin.debug:
    msg: |
      ╭───────────────────────────────────────────────────────────────────╮
      │                                                                   │
      │               Waiting until port becomes available.               │
      │                                                                   │
      ├───────────────────────────────────────────────────────────────────╯
      │ Max {{ seerr_role_poll_timeout }} seconds.

- name: 'Set owner | poll service'
  when: _seerr_srv_poll_enable.raw
  ansible.builtin.wait_for:
    port: '{{ _seerr_srv_port.raw }}'
    delay: 5
    sleep: '{{ seerr_role_poll_interval }}'
    timeout: '{{ seerr_role_poll_timeout }}'
    msg: |
      ╭───────────────────────────────────────────────────────────────────╮
      │                                                                   │
      │                            Timed out.                             │
      │                                                                   │
      ╰───────────────────────────────────────────────────────────────────╯

- name: 'Set owner'
  block:
    - name: 'Set owner | update {{ _seerr_srv_owner_email.raw }}'
      ansible.builtin.uri:
        url: '{{ seerr_role_api_base }}/auth/local'
        method: 'POST'
        status_code: [200]
        headers:
          'X-Api-Key': '{{ _seerr_cfg_api_key.raw }}'
        body:
          email: '{{ _seerr_srv_owner_email.raw }}'
          password: '{{ _seerr_srv_owner_password.raw }}'
        body_format: 'json'
      register: _seerr_api
  rescue:
    - name: 'Set owner | WARNING ⓘ'
      ansible.builtin.debug:
        msg: |
          ╭───────────────────────────────────────────────────────────────────╮
          │                                                                   │
          │               Owner not authorized for API access.                │
          │                                                                   │
          ├───────────────────────────────────────────────────────────────────╯
          │ Adding owner directly to DB.

    - name: 'Set owner | hash password'
      ansible.builtin.shell: >
          source {{ _seerr.nvm_env }} &&
          {{ _seerr.corepack }} &&
          node -e "import bcrypt from 'bcrypt';
          const pw =
          await bcrypt.hash('{{ _seerr_srv_owner_password.raw }}', 12);
          console.log(pw);"
      args:
        executable: '/bin/bash'
        chdir: '{{ seerr_role_repo_extract_symlink }}'
      changed_when: false
      become: true
      become_user: '{{ _seerr_srv_user.raw }}'
      register: _seerr_cmd
      # TODO(role): disabled until future ansible data tagging update.
      # no_log: true  # password.

    # TODO(role): disabled until future ansible data tagging update.
    # no_log: true  # password and auth tokens.
    - name: 'Set owner | add {{ _seerr_srv_owner_email.raw }}'
      when: _seerr_cfg_db_type.raw == 'sqlite'
      ansible.builtin.include_role:
        name: 'r_pufky.srv.sqlite'
      vars:
        sqlite_sql: >
          "{{ seerr_role_sqlite_user_insert }} (
          1,
          \"{{ _seerr_srv_owner_email.raw }}\",
          2,
          \"{{ _seerr_srv_owner_avatar.raw }}\",
          \"{{ _seerr_cmd.stdout_lines[-1] }}\",
          2
          )"
        sqlite_db: '{{ seerr_role_sqlite_db }}'
        sqlite_quote: false
        sqlite_become: true
        sqlite_become_user: '{{ _seerr_srv_user.raw }}'

    # TODO(role): disabled until future ansible data tagging update.
    # no_log: true  # password and auth tokens.
    - name: 'Set owner | add {{ _seerr_srv_owner_email.raw }}'
      when: _seerr_cfg_db_type.raw == 'postgres'
      community.postgresql.postgresql_query:
        ca_cert: '{{ _seerr_cfg_db_ssl_ca_file._dest }}'
        login_db: '{{ _seerr_cfg_db_name.raw }}'
        login_host: '{{
            _seerr_cfg_db_host.raw
            if _seerr_cfg_db_host.raw | length > 0 else
            omit
          }}'
        login_password: '{{ _seerr_cfg_db_pass.raw }}'
        login_unix_socket: '{{
            seerr_cfg_db_socket_path.raw
            if _seerr_cfg_db_host.raw | length == 0 else
            omit
          }}'
        login_user: '{{ _seerr_cfg_db_user.raw }}'
        port: '{{
            _seerr_cfg_db_port.raw
            if _seerr_cfg_db_host.raw | length > 0 else
            omit
          }}'
        ssl_mode: 'prefer'
        query: >
          {{ seerr_role_pg_user_insert }} (
          1,
          '{{ _seerr_srv_owner_email.raw }}',
          2,
          '{{ _seerr_srv_owner_avatar.raw }}',
          '{{ _seerr_cmd.stdout_lines[-1] }}',
          2
          )
          ON CONFLICT (id) DO UPDATE SET
          email='{{ _seerr_srv_owner_email.raw }}',
          permissions=2,
          avatar='{{ _seerr_srv_owner_avatar.raw }}',
          password='{{ _seerr_cmd.stdout_lines[-1] }}',
          "userType"=2
          WHERE "user".id=1;

    - name: 'Set owner | update {{ _seerr_srv_owner_email.raw }}'
      ansible.builtin.uri:
        url: '{{ seerr_role_api_base }}/auth/local'
        method: 'POST'
        status_code: [200]
        headers:
          'X-Api-Key': '{{ _seerr_cfg_api_key.raw }}'
        body:
          email: '{{ _seerr_srv_owner_email.raw }}'
          password: '{{ _seerr_srv_owner_password.raw }}'
        body_format: 'json'
      failed_when: false
      register: _seerr_api

    - name: 'Set owner | SUCCESS ✔'
      when: _seerr_api.status == 200
      ansible.builtin.debug:
        msg: |
          ╭───────────────────────────────────────────────────────────────────╮
          │                                                                   │
          │                     Owner successfully added.                     │
          │                                                                   │
          ╰───────────────────────────────────────────────────────────────────╯

    - name: 'Set owner | FAILURE ✘'
      when: _seerr_api.status != 200
      ansible.builtin.fail:
        msg: |
          ╭───────────────────────────────────────────────────────────────────╮
          │                                                                   │
          │                       Failed to add owner.                        │
          │                                                                   │
          ├───────────────────────────────────────────────────────────────────╯
          │ seerr_srv_owner_email: '{{ seerr_srv_owner_email }}'
          │ seerr_srv_owner_username: '{{ seerr_srv_owner_username }}'
          │ seerr_srv_owner_password: '{{ seerr_srv_owner_password }}'
          │ seerr_srv_owner_avatar: '{{ seerr_srv_owner_avatar }}'
