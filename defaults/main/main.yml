---
###############################################################################
# Feature Flags
###############################################################################

# 1. Backup config to seerr_cfg_backup_d?
#
# Backup existing config data directory and exit role. Creates archive of
# /var/opt/seerr/config. seerr_cfg_backup_d created if non-existent. Services
# stopped, files backed up, services started.
#
# Default: False.
seerr_flg_backup: false

# 2. Restore config from backup?
#
# Restore config data directory and exit role. Extracts latest backup archive
# to /var/opt/seerr/config. Services stopped, files backed up, services
# started.
#
# Default: False.
seerr_flg_restore: false

# 3. Run maintenance tasks?
#
# Preform role maintenance tasks including removal of old role versions.
#
# Default: True.
seerr_flg_maintenance: true

# 4. Install application?
#
# Creates required default directories, users, install packages, download
# software, builds, autogenerates config, update and start services.
#
# Default: True.
seerr_flg_install: true

# 5. Set configuration data?
#
# Overwrite config data directory sourced from seerr_cfg_d. Use backup and
# restore to manage configuration data. Stops service, deploys user config
# data, updates and starts services.
#
# Default: False.
seerr_flg_config: false

###############################################################################
# Service
###############################################################################

# Seerr Release.
#
# Versions (Schematic):
#       MAJOR: Unsafe - Usually requires major role changes; only default MAJOR
#              version is supported.
#       MINOR: Safe - Usually requires no role updates. Changes usually
#              constrained to internal changes requiring no config file or
#              dependency changes.
#       PATCH: Safe - Usually requires no role updates.
#   RECOMMEND: Only increment MINOR.PATCH.
#
# Default: 'v3.1.0'.
#
# Reference:
# * https://github.com/seerr-team/seerr/releases/latest
seerr_srv_version: 'v3.1.0'

# Github access token (seerr).
#
# Unauthenticated (anonymous) API requests are heavily restricted to the sum
# total of requests to github from a given IP. Use an access token if
# receiving 403's.
#
# Classic Tokens:
# * settings > developer settings > personal access tokens (classic)
#   * notes: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * scopes: NONE
#
# Fine-grained Tokens:
# * settings > developer settings > personal access tokens (fine-grained)
#   * token name: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * description: {DESCRIPTIVE TEXT}
#   * resource owner: {YOUR ACCOUNT}
#   * repository access: Public Repositories (read-only)
#
# Default: '' (unauthenticated).
#
# Reference:
# * https://docs.github.com/en/authentication
seerr_srv_token: ''

# User that Seerr will run under.
#
# 'seerr' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'seerr'.
seerr_srv_user: 'seerr'

# Group that Seerr will run under.
#
# 'seerr' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'seerr'.
seerr_srv_group: 'seerr'

###############################################################################
# Config
###############################################################################

# Seerr configuration to set.
#
# Ansible controller path to source configuration files (treated as a jinja2
# templates allowing for ansible variable interpretation). Overwrites existing
# config data in /var/opt/seerr/*. SQlite databases should be included or use
# restore. Files not sourced will be removed (cache metadata directory will not
# be touched). A default configuration is autogenerated if not provided.
#
# Place service environment configuration in '.env'. See templates/ for
# examples.
#
# Use seerr_flg_backup, seerr_flg_restore to include MediaCover metadata.
#
# seerr_cfg_d: 'host_vars/seerr.example.com/config'
#
# Default: '' (use minimally configured default).
seerr_cfg_d: ''

# Role backup location.
#
# All backup operations for a given role execution are stored locally on
# ansible controller with the format 'YYYY-MM-DDTHHMMSS_{FILE}'.
#
# seerr_cfg_backup_d: 'data/seerr'
#
# Default: ''
seerr_cfg_backup_d: ''

# Backup metadata (cache) directory?
#
# Multi-GB. Safe to delete. Will cause large backup/restore transfers or
# re-download of metadata when service is restarted. Alternatively externally
# manage /var/opt/seerr/config/cache.
#
# Default: True.
seerr_cfg_backup_metadata: true
