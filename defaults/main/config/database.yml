---
###############################################################################
# Database
###############################################################################
# Existing databases are migrated automatically when new versions are
# installed. Migration between database platforms is not supported and must be
# done manually.
#
# Reference:
# * https://docs.seerr.dev/extending-seerr/database-config

# Database type.
#
# Values:
#     sqlite: Sqlite3 (default).
#   postgres: Postgres.
#
# Default: 'sqlite'.
seerr_cfg_db_type: 'sqlite'

# Log database queries? Default: False.
seerr_cfg_db_log_queries: false

###############################################################################
# Postgres Settings
###############################################################################
# Requires: seerr_cfg_db_type=postgres.
#
# Database user must have root permissions for database.

# Database host.
#
# Mutually exclusive with seerr_cfg_db_socket_path. If both are defined
# TCP connections are used.
#
# Default: 'localhost'.
seerr_cfg_db_host: 'localhost'

# Database port.
#
# Requires seerr_cfg_db_host.
#
# Mutually exclusive with seerr_cfg_db_socket_path.
#
# Default: 5432.
seerr_cfg_db_port: 5432

# Database Unix socket path.
#
# Mutually exclusive with seerr_cfg_db_host, seerr_cfg_db_port. If
# both are defined TCP connections are used.
#
# Default: '' (disabled).
seerr_cfg_db_socket_path: ''

# Database user. Default: 'seerr'.
seerr_cfg_db_user: 'seerr'

# Database password. Default: 'seerr'.
seerr_cfg_db_pass: 'seerr'

# Database password. Default: 'seerr'.
seerr_cfg_db_name: 'seerr'

# Enable SSL? Default: False.
seerr_cfg_db_use_ssl: false

# Reject unverifiable/unauthorized certificates?
#
# Requires seerr_cfg_db_use_ssl.
#
# Default: True.
seerr_cfg_db_ssl_reject_unauthorized: true

# CA certificate to verify connection.
#
# Requires seerr_cfg_db_use_ssl.
#
# Sourced from ansible controller; automatically placed in
# /opt/seerr/seerr/config/ca.cert with correct permissions.
#
# Values:
#   '': Do not set CA certificate (default).
#
# seerr_cfg_db_ssl_ca_file:
#   'host_vars/seerr.example.com/data/ca.cert'
#
# Default: ''.
seerr_cfg_db_ssl_ca_file: ''

# Private key (PEM) file.
#
# Requires seerr_cfg_db_use_ssl.
#
# Sourced from ansible controller; automatically placed in
# /opt/seerr/seerr/config/key.pem with correct permissions.
#
# Values:
#   '': Do not set private key file (default).
#
# seerr_cfg_db_ssl_key_file:
#   'host_vars/seerr.example.com/data/key.pem'
#
# Default: ''.
seerr_cfg_db_ssl_key_file: ''

# Private key certificate chain (PEM) file.
#
# Requires seerr_cfg_db_use_ssl.
#
# Sourced from ansible controller; automatically placed in
# /opt/seerr/seerr/config/chain.pem with correct permissions.
#
# Values:
#   '': Do not set private key file (default).
#
# seerr_cfg_db_ssl_key_file:
#   'host_vars/seerr.example.com/data/chain.pem'
#
# Default: ''.
seerr_cfg_db_ssl_cert_file: ''
