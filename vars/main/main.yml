---
###############################################################################
# Seerr Role Options
###############################################################################
# Build from source.
#
# Updates:
# * Branch for new Debian releases.
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update role defaults (includes updating defaults, tasks):
#   * Use configuration docs to add new variables.
#   * Use defaults to remove any changed/deprecated variables.
#   * Hidden variables may be discovered after running the service and shutting
#     down and checking settings.json for differences.
#   * Diff release documentation for new variable exposure.
# * Update tests for any changes.
#   * Use BARE VERSION for find and replace to set new version.
# * Standard role validation testing (yamllint, ansible-lint, to-do, no-qa).
# * Tag with OS-APP-ROLE version.
#
# Reference:
# * https://seerr.dev/
# * https://docs.seerr.dev/
# * https://github.com/seerr-team/seerr

# Last time Seerr options were validated against a default configuration.
seerr_role_validate_date: '2025-08-24'
seerr_role_validate_release: 'trixie'
seerr_role_validate_version: 'v2.7.3'

seerr_role_poll_interval: 3
seerr_role_poll_timeout: 30
seerr_role_poll_msg: '{{
    "(max " ~ seerr_role_poll_timeout ~ "s)" ~
    (30 - (seerr_role_poll_timeout | lower | length)) * " "
  }}'

###############################################################################
# APT Packages
###############################################################################

seerr_role_packages:
  - 'git'  # nvm/pnpm.
  - 'curl'  # nvm/pnpm.
  - 'sqlite3'  # sqlite3.
  - 'python3-psycopg2'  # community.postgresql_query.

###############################################################################
# Seerr GitHub Options
###############################################################################
# Only source code is released.
#
# Reference:
# * https://github.com/seerr-team/seerr/tags

seerr_role_repo_release_owner: 'seerr-team'
seerr_role_repo_release_repo: 'seerr'
seerr_role_repo_release_asset: '{VERSION}.tar.gz'
seerr_role_repo_extract_dir: '/opt/seerr'
seerr_role_repo_extract_symlink: '/opt/seerr/seerr'
seerr_role_repo_release_download_source_enable: true

###############################################################################
# NVM Options
###############################################################################

seerr__nvm_version: 'v0.40.3'
seerr__nvm_nodejs_version: '22'
seerr__nvm_pnpm_version: '9'
seerr__nvm_url: '{{
    "https://raw.githubusercontent.com/nvm-sh/nvm/" ~
    seerr__nvm_version ~ "/install.sh"
  }}'

###############################################################################
# Build Options
###############################################################################

seerr_role_etc_dir: '/etc/seerr'
seerr_role_service_cfg: '/etc/seerr/seerr.conf'
seerr_role_opt_dir: '/opt/seerr/seerr'
seerr_role_config_dir: '/opt/seerr/seerr/config'
seerr_role_settings_cfg: '/opt/seerr/seerr/config/settings.json'
seerr_role_sqlite_db: '/opt/seerr/seerr/config/db/db.sqlite3'

###############################################################################
# API Options
###############################################################################
#
# Reference:
# * http://localhost:5055/api-docs

seerr_role_api_base: 'http://localhost:5055/api/v1'

###############################################################################
# Default Seerr User/Group
###############################################################################

seerr_role_group:
  name: 'seerr'
  gid: 5560

seerr_role_user:
  name: 'seerr'
  group: 'seerr'
  uid: 5560
  shell: '/bin/bash'
  home: '/opt/seerr'
  create_home: true
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true

###############################################################################
# Default Seerr db queries
###############################################################################
# queries used to modify db for setup.

seerr_role_sqlite_user_insert: >
  INSERT OR REPLACE INTO \"user\" (id, email, permissions, avatar, password,
  userType) VALUES

# Case specific columns require double quotes.
seerr_role_pg_user_insert: >
  INSERT INTO "user" (id, email, permissions, avatar, password, "userType")
  VALUES
